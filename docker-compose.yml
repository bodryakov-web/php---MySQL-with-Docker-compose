services:
  php:
    build: .
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
    depends_on:
      - db
    environment:
      DB_NAME: p-351366_php-docker
      DB_USER: p-351366_php-docker
      DB_PASS: Anna-140275
    networks:
      - app-network

  db:
    image: mysql:8.0.34
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: p-351366_php-docker
      MYSQL_INITDB_SKIP_TZINFO: 1
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    volumes:
      - ./db-init.sql:/docker-entrypoint-initdb.d/db-init.sql:ro
      - mysql_data:/var/lib/mysql
    networks:
      - app-network

volumes:
  mysql_data:

networks:
  app-network: